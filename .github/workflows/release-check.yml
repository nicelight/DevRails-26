name: Release Check

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  skill-pack-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Assert source repository hygiene
        shell: bash
        run: |
          set -euo pipefail

          if find . -name '.DS_Store' | grep -q .; then
            echo 'Found .DS_Store files in repository'
            find . -name '.DS_Store'
            exit 1
          fi

          if find skills -path 'skills/_shared' -prune -o -type f -name 'shared-*' -print | grep -q .; then
            echo 'Found vendored shared-* files in source-only repository'
            find skills -path 'skills/_shared' -prune -o -type f -name 'shared-*' -print
            exit 1
          fi

          if git ls-files .memory-bank | grep -q .; then
            echo 'Found tracked generated .memory-bank files in source-only repository'
            git ls-files .memory-bank
            exit 1
          fi

          test -f scripts/install-framework.mjs
          test -f scripts/vendor-shared.mjs
          test -f skills/_shared/scripts/init-mb.js
          test -f skills/_shared/references/structure-template.md
          test -f skills/_shared/references/commands/spec-design.md
          test -f skills/_shared/references/commands/foundation-to-tasks.md
          test -f skills/_shared/references/commands/prd-to-tasks.md
          test -f skills/_shared/references/commands/review-feat-plan.md
          test -f skills/_shared/references/commands/review-tasks-plan.md
          test ! -e skills/_shared/references/commands/analysis.md
          test ! -e skills/_shared/references/commands/review.md
          test -f skills/_shared/references/commands/execute.md
          test -f skills/_shared/references/commands/verify.md
          test ! -e skills/_shared/references/commands/mb-packet.md
          test ! -e skills/_shared/references/protocols/packet-template.json
          test -f skills/_shared/references/roles/general.md
          test -f skills/_shared/references/roles/orchestrator.md
          test -f skills/_shared/references/roles/worker.md
          test -f skills/mb-garden/assets/mb-lint.mjs
          test -f skills/mb-garden/assets/mb-doctor.mjs
          test "$(find skills -mindepth 2 -maxdepth 2 -type f -name SKILL.md -printf '%h\n' | sort)" = $'skills/cold-start\nskills/mb-garden\nskills/mb-harness\nskills/mb-init'
          grep -Fq 'new default `FT-*` spec hub' skills/_shared/agents/review-plan.md

      - name: Syntax check helper scripts
        shell: bash
        run: |
          set -euo pipefail
          npm run check:syntax --silent

      - name: Install-only smoke test
        shell: bash
        run: |
          set -euo pipefail
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT

          mkdir -p "$TMP_DIR/project"
          cd "$TMP_DIR/project"
          obsolete_skills=(mb-analysis mb-execute mb-from-prd mb-map-codebase mb-packet mb-red-verify mb-review mb-verify)
          for root in .agents/skills .claude/skills; do
            for skill in "${obsolete_skills[@]}"; do
              mkdir -p "$root/$skill"
              printf '%s\n' '---' "name: $skill" 'description: legacy' '---' '' "# $skill legacy package" > "$root/$skill/SKILL.md"
            done
          done
          node "$GITHUB_WORKSPACE/scripts/install-framework.mjs" --skill '*' --yes

          for root in .agents/skills .claude/skills; do
            for skill in "${obsolete_skills[@]}"; do
              test ! -e "$root/$skill"
            done
          done
          test -f .agents/skills/cold-start/SKILL.md
          test -f .claude/skills/cold-start/SKILL.md
          test -f .agents/skills/spec-design/SKILL.md
          test -f .claude/skills/spec-design/SKILL.md
          test -f .agents/skills/foundation-to-tasks/SKILL.md
          test -f .claude/skills/foundation-to-tasks/SKILL.md
          test ! -e .agents/skills/analysis/SKILL.md
          test ! -e .claude/skills/analysis/SKILL.md
          grep -q '# /spec-design' .agents/skills/spec-design/SKILL.md
          grep -q '# /foundation-to-tasks' .claude/skills/foundation-to-tasks/SKILL.md
          ! grep -q 'Read and follow the instructions in `.memory-bank/commands/' .agents/skills/spec-design/SKILL.md
          test ! -e .memory-bank

      - name: Bootstrap and sync smoke test
        shell: bash
        run: |
          set -euo pipefail
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT

          TARGET="$TMP_DIR/target-repo"
          TODAY="$(date -u +%F)"
          node "$GITHUB_WORKSPACE/scripts/install-framework.mjs" --bootstrap --target "$TARGET" --yes

          test -f "$TARGET/AGENTS.md"
          test -f "$TARGET/.memory-bank/index.md"
          test -f "$TARGET/.memory-bank/spec-index.md"
          test -f "$TARGET/.memory-bank/spec-backbone.md"
          test -f "$TARGET/.memory-bank/constitution.md"
          test -f "$TARGET/.memory-bank/requirements.md"
          test -f "$TARGET/.memory-bank/tasks/index.json"
          test -f "$TARGET/.memory-bank/schemas/task.schema.json"
          test ! -e "$TARGET/.memory-bank/packets"
          test ! -e "$TARGET/.memory-bank/tech-specs"
          test -d "$TARGET/.memory-bank/behavior-specs"
          test -f "$TARGET/.memory-bank/architecture/system-architecture.md"
          test -f "$TARGET/.memory-bank/contracts/boundary-map.md"
          test -f "$TARGET/.memory-bank/workflows/index.md"
          test -f "$TARGET/.memory-bank/workflows/execute-loop.md"
          test -f "$TARGET/.memory-bank/workflows/tier-policy.md"
          test -f "$TARGET/.memory-bank/roles/general.md"
          test -f "$TARGET/.memory-bank/roles/orchestrator.md"
          test -f "$TARGET/.memory-bank/roles/worker.md"
          test ! -e "$TARGET/.memory-bank/commands"
          test -f "$TARGET/scripts/mb-lint.mjs"
          test -f "$TARGET/scripts/mb-doctor.mjs"
          test -f "$TARGET/.claude/skills/foundation-to-tasks/SKILL.md"
          test -f "$TARGET/.agents/skills/foundation-to-tasks/SKILL.md"
          test -f "$TARGET/.claude/skills/review-feat-plan/SKILL.md"
          test -f "$TARGET/.agents/skills/review-feat-plan/SKILL.md"
          test -f "$TARGET/.claude/skills/review-tasks-plan/SKILL.md"
          test -f "$TARGET/.agents/skills/review-tasks-plan/SKILL.md"
          test ! -e "$TARGET/.claude/skills/analysis/SKILL.md"
          test ! -e "$TARGET/.agents/skills/analysis/SKILL.md"
          test ! -e "$TARGET/.claude/skills/review/SKILL.md"
          test ! -e "$TARGET/.agents/skills/review/SKILL.md"
          test ! -e "$TARGET/.claude/skills/mb-packet/SKILL.md"
          test ! -e "$TARGET/.agents/skills/mb-packet/SKILL.md"
          cmp "$TARGET/.agents/skills/prd-to-tasks/SKILL.md" "$TARGET/.claude/skills/prd-to-tasks/SKILL.md"
          grep -Fq '`reuse`:' "$TARGET/.agents/skills/prd-to-tasks/SKILL.md"
          grep -Fq '`extend`:' "$TARGET/.agents/skills/prd-to-tasks/SKILL.md"
          grep -Fq '`create`:' "$TARGET/.agents/skills/prd-to-tasks/SKILL.md"
          grep -Fq '`not_applicable`:' "$TARGET/.agents/skills/prd-to-tasks/SKILL.md"
          grep -Fq '`block`:' "$TARGET/.agents/skills/prd-to-tasks/SKILL.md"
          grep -q 'subject-based canonical path' "$TARGET/.agents/skills/prd-to-tasks/SKILL.md"
          grep -q 'Never resolve competing paths by creating a third spec' "$TARGET/.agents/skills/prd-to-tasks/SKILL.md"
          grep -q 'direct task-relevant subset of canonical specs' "$TARGET/.agents/skills/prd-to-tasks/SKILL.md"
          grep -q 'no suitable canonical spec exists' "$TARGET/.agents/skills/prd-to-tasks/SKILL.md"
          grep -Fq 'conditional T2 feature-level `/red-verify`' "$TARGET/.agents/skills/autopilot/SKILL.md"
          ! grep -R -E 'packet_required|packet_ref|source_task_hash|ready_with_gaps|/mb-packet|\.memory-bank/packets' "$TARGET/.agents/skills" "$TARGET/.claude/skills"
          grep -q '# /spec-design' "$TARGET/.agents/skills/spec-design/SKILL.md"
          grep -q '# /execute' "$TARGET/.claude/skills/execute/SKILL.md"
          ! grep -q 'Read and follow the instructions in `.memory-bank/commands/' "$TARGET/.agents/skills/execute/SKILL.md"

          grep -q 'ROLE: GENERAL' "$TARGET/AGENTS.md"
          grep -q 'roles/general.md' "$TARGET/AGENTS.md"
          ! grep -q '.memory-bank/commands' "$TARGET/AGENTS.md"
          grep -q 'Роль GENERAL' "$TARGET/.memory-bank/roles/general.md"
          grep -q 'Роль: Оркестратор' "$TARGET/.memory-bank/roles/orchestrator.md"
          grep -q '## Architecture Spine' "$TARGET/.memory-bank/architecture/system-architecture.md"
          grep -q '#### AD-NNN' "$TARGET/.memory-bank/architecture/system-architecture.md"
          grep -q '## Boundary: <producer> -> <consumer>' "$TARGET/.memory-bank/contracts/boundary-map.md"
          grep -q "^last_updated: $TODAY$" "$TARGET/.memory-bank/constitution.md"
          ! grep -q '{{TODAY}}' "$TARGET/.memory-bank/constitution.md"
          grep -Fq '| Type | Path | Status | Scope | Change route |' "$TARGET/.memory-bank/spec-index.md"
          ! grep -q 'Owner command\|feature_design.*tech-specs' "$TARGET/.memory-bank/spec-index.md"

          node -e 'const fs = require("node:fs"); const index = JSON.parse(fs.readFileSync(process.argv[1], "utf8")); if (!Array.isArray(index.tasks) || index.tasks.length !== 0) throw new Error("fresh bootstrap must start with an empty task index");' "$TARGET/.memory-bank/tasks/index.json"
          grep -Fq '^TASK-[0-9]{3}-T[0-3]-FT-[0-9]{3}-W[0-9]+$' "$TARGET/.memory-bank/schemas/task.schema.json"
          ! grep -q 'packet_required\|packet_ref' "$TARGET/.memory-bank/schemas/task.schema.json"
          grep -q 'TASK-NNN-TN-FT-NNN-WN' "$TARGET/AGENTS.md"
          test ! -e "$TARGET/.memory-bank/foundation.md"
          test ! -e "$TARGET/.memory-bank/features/FT-000-foundation.md"
          test ! -e "$TARGET/.memory-bank/tasks/TASK-000-T1-FT-000-W0.task.json"
          test ! -e "$TARGET/.memory-bank/tasks/TASK-001-T2-FT-001-W1.task.json"
          ! grep -q 'REQ-000' "$TARGET/.memory-bank/requirements.md"

          (
            cd "$TARGET"
            node scripts/mb-lint.mjs
            node scripts/mb-doctor.mjs
            node "$GITHUB_WORKSPACE/skills/_shared/scripts/init-mb.js" --sync
            node scripts/mb-lint.mjs
            node scripts/mb-doctor.mjs
          )

          node "$GITHUB_WORKSPACE/scripts/install-framework.mjs" --bootstrap --target "$TARGET" --yes --sync
          test ! -e "$TARGET/.memory-bank/commands"
          test ! -e "$TARGET/.memory-bank/tech-specs"
          grep -q '# /spec-design' "$TARGET/.agents/skills/spec-design/SKILL.md"

      - name: Single-card handoff doctor fixtures
        shell: bash
        run: |
          set -euo pipefail
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT

          TARGET="$TMP_DIR/target-repo"
          node "$GITHUB_WORKSPACE/scripts/install-framework.mjs" --bootstrap --target "$TARGET" --yes
          node - "$TARGET" <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const root = process.argv[2];
          const write = (rel, content) => {
            const target = path.join(root, rel);
            fs.mkdirSync(path.dirname(target), { recursive: true });
            fs.writeFileSync(target, content);
          };
          fs.appendFileSync(path.join(root, '.memory-bank/requirements.md'), '\n## REQ-001\n- Complete fixture requirement.\n');
          write('.memory-bank/features/FT-001-fixture.md', `---
          description: Complete fixture feature.
          status: active
          lifecycle: planned
          clarification_status: complete
          spec_design_status: complete
          spec_design_links:
            - .memory-bank/contracts/fixture-boundary.md
          ---
          # FT-001 Fixture
          ## Clarifications
          - No critical ambiguity found.
          `);
          write('.memory-bank/contracts/fixture-boundary.md', `---
          description: Fixture canonical boundary spec.
          status: active
          ---
          # Fixture Boundary
          ## Shape
          - One fixture task.
          ## Rules
          - MUST remain deterministic.
          ## Edge cases/errors
          - Missing context is rejected.
          ## Verification target
          - node --version exits successfully.
          `);
          const id = 'TASK-001-T2-FT-001-W1';
          const task = {
            id,
            title: 'Complete fixture task',
            status: 'ready',
            wave: 'W1',
            feature: 'FT-001',
            reqs: ['REQ-001'],
            depends_on: [],
            touched_files: ['src/fixture.js'],
            tier: 'T2',
            gates: [{ name: 'node', command: 'node --version', required: true }],
            verify: [],
            docs: [],
            evidence_required: [],
            purpose: 'Prove the complete single-card fixture.',
            success_outcome: 'The deterministic fixture command succeeds.',
            anti_goals: [],
            runtime_context: {
              allowed_write_scope: [],
              forbidden_scope: [],
              stop_conditions: []
            },
            source_artifacts: ['.memory-bank/contracts/fixture-boundary.md'],
            normative_inputs: [],
            constraints: [],
            invariants: [],
            verification_targets: []
          };
          const compactId = 'TASK-000-T0-FT-001-W1';
          const compactTask = {
            ...task,
            id: compactId,
            title: 'Compact fixture task',
            status: 'done',
            tier: 'T0',
            touched_files: ['README.md'],
            gates: [],
            verify: ['VERDICT: PASS\nEvidence: compact fixture'],
            purpose: undefined,
            success_outcome: undefined,
            anti_goals: undefined,
            runtime_context: undefined
          };
          Object.keys(compactTask).forEach((key) => compactTask[key] === undefined && delete compactTask[key]);
          const criticalId = 'TASK-002-T3-FT-001-W1';
          const criticalTask = {
            ...task,
            id: criticalId,
            title: 'Full protocol fixture task',
            status: 'in_progress',
            tier: 'T3',
            touched_files: ['src/critical.js']
          };
          for (const record of [compactTask, task, criticalTask]) {
            write(`.memory-bank/tasks/${record.id}.task.json`, `${JSON.stringify(record, null, 2)}\n`);
          }
          write(`.protocols/${compactId}/run.md`, 'VERDICT: PASS\nEvidence: compact fixture\n');
          for (const file of ['context.md', 'plan.md', 'progress.md', 'verification.md', 'handoff.md']) {
            write(`.protocols/${criticalId}/${file}`, '# Fixture\n');
          }
          const records = [compactId, id, criticalId].map((taskId) => ({ id: taskId, file: `${taskId}.task.json` }));
          write('.memory-bank/tasks/index.json', `${JSON.stringify({ version: 1, tasks: records }, null, 2)}\n`);
          NODE

          (
            cd "$TARGET"
            node scripts/mb-lint.mjs
            node scripts/mb-doctor.mjs --json > complete-doctor.json
            node -e 'const r=require("./complete-doctor.json"); if (r.findings.some((f)=>f.code==="TASK_HANDOFF_INCOMPLETE")) process.exit(1)'
            node -e 'const fs=require("node:fs"); const p=".memory-bank/tasks/TASK-001-T2-FT-001-W1.task.json"; const t=JSON.parse(fs.readFileSync(p)); t.purpose=""; t.touched_files=[]; t.gates=[]; fs.writeFileSync(p, JSON.stringify(t,null,2)+"\n")'
            node scripts/mb-doctor.mjs --json > incomplete-doctor.json
            node -e 'const r=require("./incomplete-doctor.json"); if (!r.findings.some((f)=>f.code==="TASK_HANDOFF_INCOMPLETE")) process.exit(1)'
            node -e 'const fs=require("node:fs"); const p=".memory-bank/tasks/TASK-001-T2-FT-001-W1.task.json"; const t=JSON.parse(fs.readFileSync(p)); t.title=42; fs.writeFileSync(p, JSON.stringify(t,null,2)+"\n")'
            if node scripts/mb-lint.mjs > invalid-schema-lint.txt 2>&1; then
              echo 'mb-lint accepted a task that violates task.schema.json string types'
              exit 1
            fi
            grep -q "'title' must be a string" invalid-schema-lint.txt
          )
