name: Release Check

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  skill-pack-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Assert source repository hygiene
        shell: bash
        run: |
          set -euo pipefail

          if find . -name '.DS_Store' | grep -q .; then
            echo 'Found .DS_Store files in repository'
            find . -name '.DS_Store'
            exit 1
          fi

          if find skills -path 'skills/_shared' -prune -o -type f -name 'shared-*' -print | grep -q .; then
            echo 'Found vendored shared-* files in source-only repository'
            find skills -path 'skills/_shared' -prune -o -type f -name 'shared-*' -print
            exit 1
          fi

          if git ls-files .memory-bank | grep -q .; then
            echo 'Found tracked generated .memory-bank files in source-only repository'
            git ls-files .memory-bank
            exit 1
          fi

          test -f scripts/install-framework.mjs
          test -f scripts/vendor-shared.mjs
          test -f skills/_shared/scripts/init-mb.js
          test -f skills/_shared/references/structure-template.md
          test -f skills/_shared/references/commands/spec-design.md
          test -f skills/_shared/references/commands/foundation-to-tasks.md
          test -f skills/_shared/references/commands/prd-to-tasks.md
          test -f skills/_shared/references/commands/review-feat-plan.md
          test -f skills/_shared/references/commands/review-tasks-plan.md
          test ! -e skills/_shared/references/commands/analysis.md
          test ! -e skills/_shared/references/commands/review.md
          test -f skills/_shared/references/commands/execute.md
          test -f skills/_shared/references/commands/verify.md
          test -f skills/_shared/references/commands/context-manifest.md
          test ! -e skills/_shared/references/commands/mb-harness.md
          test ! -e skills/_shared/references/commands/mb-packet.md
          test ! -e skills/_shared/references/protocols/packet-template.json
          test -f skills/_shared/references/roles/general.md
          test -f skills/_shared/references/roles/orchestrator.md
          test -f skills/_shared/references/roles/worker.md
          test -f skills/mb-garden/assets/mb-lint.mjs
          test -f skills/mb-garden/assets/mb-doctor.mjs
          test ! -e skills/mb-harness
          test "$(find skills -mindepth 2 -maxdepth 2 -type f -name SKILL.md -printf '%h\n' | sort)" = $'skills/cold-start\nskills/mb-garden\nskills/mb-init'
          grep -Fq 'default `FT-*` spec hub' skills/_shared/agents/review-plan.md
          ! grep -q 'testing/index.md\|testing/strategy.md' skills/_shared/references/commands/prd.md
          grep -Fq 'create/modify `.memory-bank/testing/*`' skills/_shared/references/commands/prd.md
          ! grep -q 'TASK-TESTS-' skills/_shared/references/commands/add-tests.md
          ! grep -q 'testing/index.md' skills/_shared/references/commands/add-tests.md
          grep -Fq 'has `status: in_progress`' skills/_shared/references/commands/add-tests.md
          ! grep -q 'testing_strategy\|minimal testing gates' skills/_shared/references/commands/spec-design.md
          ! grep -q '^- testing gates$' skills/_shared/references/commands/spec-design.md
          ! grep -q '^- unit tests$\|^- e2e tests' skills/_shared/references/structure-template.md
          grep -Fq '"gates": []' skills/_shared/references/structure-template.md
          ! grep -q '"name": "unit tests"\|"command": "npm test"' skills/_shared/references/structure-template.md
          grep -Fq '## Applicable quality gates' skills/_shared/references/protocols/plan-template.md
          grep -Fq 'No meaningful runnable check:' skills/_shared/references/protocols/plan-template.md
          ! grep -q 'unit tests:.*<cmd>\|integration tests:.*<cmd>\|e2e/UAT:.*<cmd>' skills/_shared/references/protocols/plan-template.md
          grep -Fq '.memory-bank/testing/*' skills/_shared/references/commands/spec-auto.md
          grep -Fq '.memory-bank/testing/*' skills/_shared/references/commands/foundation-to-tasks.md
          grep -Fq '.memory-bank/testing/*' skills/_shared/references/commands/prd-to-tasks.md
          grep -Fq '`touched_files` is advisory and non-exhaustive' skills/_shared/references/commands/prd-to-tasks.md
          grep -Fq '`touched_files` is advisory and non-exhaustive' skills/_shared/references/commands/execute.md
          grep -Fq 'Canonical execution is sequential' skills/_shared/references/workflows/execute-loop.md
          grep -Fq -- '--experimental-parallel' skills/_shared/references/workflows/autonomy-policy.md
          grep -Fq 'Optional hard write boundary; omit unless evidence justifies one.' skills/_shared/scripts/init-mb.js
          grep -Fq '<hard_invariants>' skills/_shared/references/commands/context-manifest.md
          grep -Fq '## Explorer Contract' skills/_shared/references/roles/worker.md
          grep -Fq 'Explore <target> with /context-manifest' skills/_shared/references/roles/orchestrator.md

          canonical_halts="$(grep -oE 'HALT_[A-Z_]+' skills/_shared/references/protocols/run-status-template.md | sort -u)"
          used_halts="$(grep -hoE 'HALT_[A-Z_]+' skills/_shared/references/commands/*.md skills/_shared/references/workflows/*.md | sort -u)"
          undefined_halts="$(comm -23 <(printf '%s\n' "$used_halts") <(printf '%s\n' "$canonical_halts"))"
          if [ -n "$undefined_halts" ]; then
            echo 'Found HALT_* tokens outside the canonical run-status vocabulary:'
            printf '%s\n' "$undefined_halts"
            exit 1
          fi

          product_design_commands=(brainstorm brief constitution write-prd clarify-feature discuss spec-init prd review-feat-plan spec-design spec-auto)
          for command in "${product_design_commands[@]}"; do
            spec="skills/_shared/references/commands/$command.md"
            grep -Fq '<operator_decisions>' "$spec"
            grep -Fq '<agent_discretion>' "$spec"
            grep -Fq '<validation>' "$spec"
            grep -Fq '<handoff_contract>' "$spec"
          done
          ! grep -E -q '20-40 useful ideas|ask at most 5|ask exactly one question at a time|max (5|8) words|Phase A|Phase B|Phase C' \
            skills/_shared/references/commands/{brainstorm,brief,constitution,write-prd,clarify-feature,discuss,spec-init,prd,review-feat-plan,spec-design,spec-auto}.md
          grep -Fq 'A recommendation/default is not an operator decision; silence is not consent.' skills/_shared/references/commands/write-prd.md
          grep -Fq 'Interfaces/Contracts, Data, and Verification are design coverage criteria, not' skills/_shared/references/commands/spec-design.md
          grep -Fq 'does not ask the operator during the unattended run and never' skills/_shared/references/commands/spec-auto.md
          grep -Fq 'HALT_BLOCKING_QUESTIONS' skills/_shared/references/commands/spec-auto.md
          grep -Fq 'clarified `.memory-bank/prd.md`' skills/_shared/references/commands/spec-design.md
          grep -Fq '`complete|minimal` + canonical spec-index' skills/_shared/references/commands/spec-auto.md
          grep -Fq 'clarification_status: complete' skills/_shared/references/commands/spec-init.md
          grep -Fq 'constitution_checked: true' skills/_shared/references/commands/spec-init.md
          grep -Fq 'Status: draft|reviewed|blocked' skills/_shared/references/commands/spec-init.md
          grep -Fq 'Status: reviewed' skills/_shared/references/commands/spec-design.md
          grep -Fq 'promote it to document `status: active` only after its open questions' skills/_shared/references/commands/prd.md
          grep -Fq 'Update a scoped `.protocols/<ID>/decision-log.md` only when it already exists.' skills/_shared/references/commands/discuss.md
          grep -Fq 'Do not solicit or treat an answer as accepted until its existing owning' skills/_shared/references/commands/discuss.md
          grep -Fq '`/mb` строго read-only во всех ролях и режимах.' skills/_shared/references/commands/mb.md
          grep -Fq 'Не запускай сабагентов, delegation или `/context-manifest` из `/mb`.' skills/_shared/references/commands/mb.md
          grep -Fq 'Не используй `npx skills add` или' skills/_shared/references/commands/find-skills.md
          grep -Fq '`.protocols/AUTONOMOUS-RUN/decision-log.md`' skills/_shared/references/commands/find-skills.md

          tasking_execution_commands=(foundation-to-tasks prd-to-tasks review-tasks-plan execute add-tests verify red-verify autonomous autopilot mb-sync)
          for command in "${tasking_execution_commands[@]}"; do
            spec="skills/_shared/references/commands/$command.md"
            grep -Fq '<operator_decisions>' "$spec"
            grep -Fq '<agent_discretion>' "$spec"
            grep -Fq '<validation>' "$spec"
            grep -Fq '<handoff_contract>' "$spec"
          done
          ! grep -Fq '## Status Transition Modes' \
            skills/_shared/references/commands/{foundation-to-tasks,prd-to-tasks,review-tasks-plan,execute,add-tests,verify,red-verify,autonomous,autopilot,mb-sync}.md
          grep -Fq 'coverage criteria' skills/_shared/references/commands/foundation-to-tasks.md
          grep -Fq 'completeness lenses, not a mandatory thinking order' skills/_shared/references/commands/prd-to-tasks.md
          grep -Fq '`planned` remains valid for unmet dependencies or future waves' skills/_shared/references/commands/review-tasks-plan.md
          grep -Fq 'independently builds its own hostile model' skills/_shared/references/commands/red-verify.md
          grep -Fq 'Canonical execution is sequential' skills/_shared/references/commands/autonomous.md
          grep -Fq 'Canonical execution is sequential' skills/_shared/references/commands/autopilot.md
          grep -Fq 'Thin adapter' skills/_shared/references/commands/mb-sync.md
          grep -Fq '`/mb-sync` does not run full `node scripts/mb-lint.mjs` or' skills/_shared/references/commands/mb-sync.md
          ! grep -Fq '## Status Transition Modes' skills/_shared/references/workflows/mb-sync.md
          grep -Fq 'Canonical lifecycle, tier gates, manual-versus-scheduler closure rules, and' skills/_shared/references/workflows/mb-sync.md
          grep -Fq '### 7) Sync-local consistency validation' skills/_shared/references/workflows/mb-sync.md
          grep -Fq '`/autonomous` or `/autopilot` is the sole owner of the' skills/_shared/references/workflows/mb-sync.md
          grep -Fq 'A recommendation, framework preference, reversible/conservative default,' skills/_shared/references/workflows/autonomy-policy.md
          grep -Fq '## Scheduler Failure Handling' skills/_shared/references/workflows/tier-policy.md
          grep -Fq 'A genuinely ambiguous tier is an operator decision' skills/_shared/references/workflows/tier-policy.md
          ! grep -Fq 'If unsure between two tiers, choose the higher tier' skills/_shared/references/workflows/tier-policy.md
          grep -Fq 'direct dependents of every `failed|blocked` task `blocked`' skills/_shared/references/workflows/tier-policy.md
          grep -Fq 'Scheduler Failure Handling' skills/_shared/references/commands/{autonomous,autopilot}.md
          grep -Fq 'SEMANTIC_VERDICT: semantic-pass|semantic-concern|semantic-fail' skills/_shared/references/commands/red-verify.md
          grep -Fq 'HUMAN_CHECKPOINT: done' skills/_shared/references/commands/{red-verify,autonomous,autopilot}.md
          grep -Fq 'planned|ready|in_progress|blocked|done|failed' skills/_shared/references/commands/{autonomous,autopilot}.md
          grep -Fq 'pairwise-disjoint non-empty hard' skills/_shared/references/commands/autopilot.md

      - name: Syntax check helper scripts
        shell: bash
        run: |
          set -euo pipefail
          npm run check:syntax --silent

      - name: Install-only smoke test
        shell: bash
        run: |
          set -euo pipefail
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT

          mkdir -p "$TMP_DIR/project"
          cd "$TMP_DIR/project"
          obsolete_skills=(mb-analysis mb-execute mb-from-prd mb-harness mb-map-codebase mb-packet mb-red-verify mb-review mb-verify)
          for root in .agents/skills .claude/skills; do
            for skill in "${obsolete_skills[@]}"; do
              mkdir -p "$root/$skill"
              printf '%s\n' '---' "name: $skill" 'description: legacy' '---' '' "# $skill legacy package" > "$root/$skill/SKILL.md"
            done
          done
          node "$GITHUB_WORKSPACE/scripts/install-framework.mjs" --skill '*' --yes

          for root in .agents/skills .claude/skills; do
            for skill in "${obsolete_skills[@]}"; do
              test ! -e "$root/$skill"
            done
          done
          test -f .agents/skills/cold-start/SKILL.md
          test -f .claude/skills/cold-start/SKILL.md
          test -f .agents/skills/spec-design/SKILL.md
          test -f .claude/skills/spec-design/SKILL.md
          test -f .agents/skills/foundation-to-tasks/SKILL.md
          test -f .claude/skills/foundation-to-tasks/SKILL.md
          test -f .agents/skills/context-manifest/SKILL.md
          test -f .claude/skills/context-manifest/SKILL.md
          test ! -e .agents/skills/analysis/SKILL.md
          test ! -e .claude/skills/analysis/SKILL.md
          test ! -e .agents/skills/mb-harness/SKILL.md
          test ! -e .claude/skills/mb-harness/SKILL.md
          grep -q '# /spec-design' .agents/skills/spec-design/SKILL.md
          grep -q '# /foundation-to-tasks' .claude/skills/foundation-to-tasks/SKILL.md
          grep -q '# /context-manifest' .agents/skills/context-manifest/SKILL.md
          ! grep -q 'Read and follow the instructions in `.memory-bank/commands/' .agents/skills/spec-design/SKILL.md
          for command in discuss mb find-skills; do
            test -f ".agents/skills/$command/SKILL.md"
            test -f ".claude/skills/$command/SKILL.md"
            cmp ".agents/skills/$command/SKILL.md" ".claude/skills/$command/SKILL.md"
          done
          grep -Fq '`/mb` строго read-only во всех ролях и режимах.' .agents/skills/mb/SKILL.md
          grep -Fq '`.protocols/AUTONOMOUS-RUN/decision-log.md`' .claude/skills/find-skills/SKILL.md
          cmp .agents/skills/mb-doctor/SKILL.md .claude/skills/mb-doctor/SKILL.md
          grep -Fq '`CLI_INVALID_ARGUMENT` error before readiness checks run.' .agents/skills/mb-doctor/SKILL.md
          grep -Fq '`CONSTITUTION_STRUCTURE_INVALID` in `--strict`' .agents/skills/mb-doctor/SKILL.md
          grep -Fq '`FEATURE_RED_VERIFY_VERDICT_MISSING` is a warning in default' .agents/skills/mb-doctor/SKILL.md
          test ! -e .memory-bank

          SELECTIVE_VERIFY_TARGET="$TMP_DIR/selective-verify"
          for root in .agents/skills .claude/skills; do
            mkdir -p "$SELECTIVE_VERIFY_TARGET/$root/mb-verify"
            printf '%s\n' '---' 'name: mb-verify' 'description: legacy' '---' '' '# mb-verify legacy package' > "$SELECTIVE_VERIFY_TARGET/$root/mb-verify/SKILL.md"
          done
          (
            cd "$SELECTIVE_VERIFY_TARGET"
            node "$GITHUB_WORKSPACE/scripts/install-framework.mjs" --skill verify --yes
          )
          for root in .agents/skills .claude/skills; do
            test ! -e "$SELECTIVE_VERIFY_TARGET/$root/mb-verify"
            test -f "$SELECTIVE_VERIFY_TARGET/$root/verify/SKILL.md"
          done

          CUSTOM_VERIFY_TARGET="$TMP_DIR/custom-verify"
          for root in .agents/skills .claude/skills; do
            mkdir -p "$CUSTOM_VERIFY_TARGET/$root/mb-verify"
            printf '%s\n' '---' 'name: mb-verify-custom' 'description: user-owned' '---' '' '# mb-verify custom verifier' > "$CUSTOM_VERIFY_TARGET/$root/mb-verify/SKILL.md"
          done
          (
            cd "$CUSTOM_VERIFY_TARGET"
            node "$GITHUB_WORKSPACE/scripts/install-framework.mjs" --skill verify --yes > install.log
          )
          for root in .agents/skills .claude/skills; do
            grep -Fq '# mb-verify custom verifier' "$CUSTOM_VERIFY_TARGET/$root/mb-verify/SKILL.md"
            test -f "$CUSTOM_VERIFY_TARGET/$root/verify/SKILL.md"
          done
          test "$(grep -Fc 'mb-verify is obsolete but does not match the DevRails legacy skill; left unchanged' "$CUSTOM_VERIFY_TARGET/install.log")" = "2"

          UNRELATED_SELECTIVE_TARGET="$TMP_DIR/unrelated-selective"
          for root in .agents/skills .claude/skills; do
            mkdir -p "$UNRELATED_SELECTIVE_TARGET/$root/mb-verify"
            printf '%s\n' '---' 'name: mb-verify' 'description: legacy' '---' '' '# mb-verify legacy package' > "$UNRELATED_SELECTIVE_TARGET/$root/mb-verify/SKILL.md"
          done
          (
            cd "$UNRELATED_SELECTIVE_TARGET"
            node "$GITHUB_WORKSPACE/scripts/install-framework.mjs" --skill prd --yes
          )
          for root in .agents/skills .claude/skills; do
            test -f "$UNRELATED_SELECTIVE_TARGET/$root/mb-verify/SKILL.md"
            test -f "$UNRELATED_SELECTIVE_TARGET/$root/prd/SKILL.md"
          done

      - name: Bootstrap and sync smoke test
        shell: bash
        run: |
          set -euo pipefail
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT

          TARGET="$TMP_DIR/target-repo"
          TODAY="$(date -u +%F)"
          node "$GITHUB_WORKSPACE/scripts/install-framework.mjs" --bootstrap --target "$TARGET" --yes

          test -f "$TARGET/AGENTS.md"
          test -f "$TARGET/.memory-bank/index.md"
          test -f "$TARGET/.memory-bank/spec-index.md"
          test -f "$TARGET/.memory-bank/spec-backbone.md"
          test -f "$TARGET/.memory-bank/constitution.md"
          test -f "$TARGET/.memory-bank/requirements.md"
          test -f "$TARGET/.memory-bank/skills/index.md"
          test -f "$TARGET/.memory-bank/tasks/index.json"
          test -f "$TARGET/.memory-bank/schemas/task.schema.json"
          test ! -e "$TARGET/.memory-bank/packets"
          test ! -e "$TARGET/.memory-bank/tech-specs"
          test -d "$TARGET/.memory-bank/behavior-specs"
          test -f "$TARGET/.memory-bank/architecture/system-architecture.md"
          test -f "$TARGET/.memory-bank/contracts/boundary-map.md"
          test -f "$TARGET/.memory-bank/testing/index.md"
          test -f "$TARGET/.memory-bank/testing/strategy.md"
          test -f "$TARGET/.memory-bank/workflows/index.md"
          required_workflows=(autonomy-policy execute-loop mb-sync tier-policy)
          for workflow in "${required_workflows[@]}"; do
            test -f "$TARGET/.memory-bank/workflows/$workflow.md"
          done
          test -f "$TARGET/.memory-bank/roles/general.md"
          test -f "$TARGET/.memory-bank/roles/orchestrator.md"
          test -f "$TARGET/.memory-bank/roles/worker.md"
          test ! -e "$TARGET/.memory-bank/commands"
          test -f "$TARGET/scripts/mb-lint.mjs"
          test -f "$TARGET/scripts/mb-doctor.mjs"
          test -f "$TARGET/.claude/skills/foundation-to-tasks/SKILL.md"
          test -f "$TARGET/.agents/skills/foundation-to-tasks/SKILL.md"
          test -f "$TARGET/.claude/skills/review-feat-plan/SKILL.md"
          test -f "$TARGET/.agents/skills/review-feat-plan/SKILL.md"
          test -f "$TARGET/.claude/skills/review-tasks-plan/SKILL.md"
          test -f "$TARGET/.agents/skills/review-tasks-plan/SKILL.md"
          test -f "$TARGET/.claude/skills/context-manifest/SKILL.md"
          test -f "$TARGET/.agents/skills/context-manifest/SKILL.md"
          test ! -e "$TARGET/.claude/skills/analysis/SKILL.md"
          test ! -e "$TARGET/.agents/skills/analysis/SKILL.md"
          test ! -e "$TARGET/.claude/skills/review/SKILL.md"
          test ! -e "$TARGET/.agents/skills/review/SKILL.md"
          test ! -e "$TARGET/.claude/skills/mb-packet/SKILL.md"
          test ! -e "$TARGET/.agents/skills/mb-packet/SKILL.md"
          test ! -e "$TARGET/.claude/skills/mb-harness/SKILL.md"
          test ! -e "$TARGET/.agents/skills/mb-harness/SKILL.md"
          cmp "$TARGET/.agents/skills/prd-to-tasks/SKILL.md" "$TARGET/.claude/skills/prd-to-tasks/SKILL.md"
          grep -Fq '`reuse`:' "$TARGET/.agents/skills/prd-to-tasks/SKILL.md"
          grep -Fq '`extend`:' "$TARGET/.agents/skills/prd-to-tasks/SKILL.md"
          grep -Fq '`create`:' "$TARGET/.agents/skills/prd-to-tasks/SKILL.md"
          grep -Fq '`not_applicable`:' "$TARGET/.agents/skills/prd-to-tasks/SKILL.md"
          grep -Fq '`block`:' "$TARGET/.agents/skills/prd-to-tasks/SKILL.md"
          grep -q 'subject-based canonical path' "$TARGET/.agents/skills/prd-to-tasks/SKILL.md"
          grep -q 'Never resolve competing canonical paths by creating a third spec' "$TARGET/.agents/skills/prd-to-tasks/SKILL.md"
          grep -q 'direct task-relevant subset of canonical specs' "$TARGET/.agents/skills/prd-to-tasks/SKILL.md"
          grep -q 'no suitable canonical spec exists' "$TARGET/.agents/skills/prd-to-tasks/SKILL.md"
          grep -Fq '`touched_files` is advisory and non-exhaustive' "$TARGET/.agents/skills/prd-to-tasks/SKILL.md"
          grep -Fq '`touched_files` is advisory and non-exhaustive' "$TARGET/.agents/skills/execute/SKILL.md"
          grep -Fq 'Canonical execution is sequential' "$TARGET/.memory-bank/workflows/execute-loop.md"
          grep -Fq -- '--experimental-parallel' "$TARGET/.memory-bank/workflows/autonomy-policy.md"
          grep -Fq 'run `/red-verify --feature FT-<ID>`' "$TARGET/.agents/skills/autopilot/SKILL.md"
          ! grep -R -E 'packet_required|packet_ref|source_task_hash|ready_with_gaps|/mb-packet|\.memory-bank/packets' "$TARGET/.agents/skills" "$TARGET/.claude/skills"
          ! grep -R -E 'ROLLBACK_RECOVERY_NOTE|TASK_T3_ROLLBACK_MISSING' \
            "$TARGET/AGENTS.md" \
            "$TARGET/.agents/skills" \
            "$TARGET/.claude/skills" \
            "$TARGET/.memory-bank/workflows" \
            "$TARGET/scripts/mb-doctor.mjs"
          grep -Fq 'Full `/mb-sync` runs once at the wave boundary' "$TARGET/.agents/skills/autopilot/SKILL.md"
          grep -Fq 'run `/mb-sync` once for already-written authoritative state' "$TARGET/.agents/skills/autonomous/SKILL.md"
          grep -Fq 'Thin adapter' "$TARGET/.agents/skills/mb-sync/SKILL.md"
          cmp "$TARGET/.agents/skills/mb-sync/SKILL.md" "$TARGET/.claude/skills/mb-sync/SKILL.md"
          grep -Fq '`/mb-sync` does not run full `node scripts/mb-lint.mjs` or' "$TARGET/.agents/skills/mb-sync/SKILL.md"
          grep -Fq '### 7) Sync-local consistency validation' "$TARGET/.memory-bank/workflows/mb-sync.md"
          grep -Fq '`/autonomous` or `/autopilot` is the sole owner of the' "$TARGET/.memory-bank/workflows/mb-sync.md"
          grep -Fq 'independently builds its own hostile model' "$TARGET/.agents/skills/red-verify/SKILL.md"
          grep -q '# /spec-design' "$TARGET/.agents/skills/spec-design/SKILL.md"
          grep -q '# /execute' "$TARGET/.claude/skills/execute/SKILL.md"
          grep -q '# /context-manifest' "$TARGET/.claude/skills/context-manifest/SKILL.md"
          ! grep -q 'Read and follow the instructions in `.memory-bank/commands/' "$TARGET/.agents/skills/execute/SKILL.md"

          grep -q 'ROLE: GENERAL' "$TARGET/AGENTS.md"
          grep -q 'roles/general.md' "$TARGET/AGENTS.md"
          grep -Fq '## KISS / Avoid overengineering' "$TARGET/AGENTS.md"
          grep -Fq 'Implement the simplest solution that fully satisfies current requirements and specs.' "$TARGET/AGENTS.md"
          grep -Fq 'KISS does not permit skipping required correctness, security, compatibility, or verification gates.' "$TARGET/AGENTS.md"
          ! grep -q '^- unit tests$\|^- e2e tests' "$TARGET/AGENTS.md"
          grep -Fq '## Communication' "$TARGET/AGENTS.md"
          grep -Fq 'Always answer this user in Russian, while preserving stable English technical terms and established expressions when they are conventional in software engineering, product, or workflow contexts.' "$TARGET/AGENTS.md"
          ! grep -q '.memory-bank/commands' "$TARGET/AGENTS.md"
          grep -q 'Роль GENERAL' "$TARGET/.memory-bank/roles/general.md"
          grep -q 'Роль: Оркестратор' "$TARGET/.memory-bank/roles/orchestrator.md"
          grep -Fq '/context-manifest' "$TARGET/.memory-bank/skills/index.md"
          grep -Fq '## Explorer Contract' "$TARGET/.memory-bank/roles/worker.md"
          grep -Fq 'Explore <target> with /context-manifest' "$TARGET/.memory-bank/roles/orchestrator.md"
          grep -q '## Architecture Spine' "$TARGET/.memory-bank/architecture/system-architecture.md"
          grep -q '#### AD-NNN' "$TARGET/.memory-bank/architecture/system-architecture.md"
          ! grep -q '^## Testing Strategy$' "$TARGET/.memory-bank/architecture/system-architecture.md"
          ! grep -q '^| testing_strategy |' "$TARGET/.memory-bank/spec-backbone.md"
          grep -q '## Boundary: <producer> -> <consumer>' "$TARGET/.memory-bank/contracts/boundary-map.md"
          grep -q "^last_updated: $TODAY$" "$TARGET/.memory-bank/constitution.md"
          ! grep -q '{{TODAY}}' "$TARGET/.memory-bank/constitution.md"
          grep -Fq '| Type | Path | Status | Scope | Change route |' "$TARGET/.memory-bank/spec-index.md"
          grep -Fq '| testing | [.memory-bank/testing/strategy.md](testing/strategy.md) | active | Framework baseline testing policy. | explicit project-level user decision |' "$TARGET/.memory-bank/spec-index.md"
          ! grep -q 'Owner command\|feature_design.*tech-specs' "$TARGET/.memory-bank/spec-index.md"
          grep -Fq '[Testing strategy](strategy.md)' "$TARGET/.memory-bank/testing/index.md"
          grep -Fq '[SDD Spec Index](../spec-index.md)' "$TARGET/.memory-bank/testing/index.md"
          grep -Fq 'Use the cheapest check that reliably proves the required behavior.' "$TARGET/.memory-bank/testing/strategy.md"

          node -e 'const fs = require("node:fs"); const index = JSON.parse(fs.readFileSync(process.argv[1], "utf8")); if (!Array.isArray(index.tasks) || index.tasks.length !== 0) throw new Error("fresh bootstrap must start with an empty task index");' "$TARGET/.memory-bank/tasks/index.json"
          grep -Fq '^TASK-[0-9]{3}-T[0-3]-FT-[0-9]{3}-W[0-9]+$' "$TARGET/.memory-bank/schemas/task.schema.json"
          grep -Fq 'Advisory, expected, non-exhaustive change surface confirmed by executor preflight.' "$TARGET/.memory-bank/schemas/task.schema.json"
          grep -Fq 'Optional hard write boundary; omit unless evidence justifies one.' "$TARGET/.memory-bank/schemas/task.schema.json"
          ! grep -q 'packet_required\|packet_ref' "$TARGET/.memory-bank/schemas/task.schema.json"
          grep -q 'TASK-NNN-TN-FT-NNN-WN' "$TARGET/AGENTS.md"
          test ! -e "$TARGET/.memory-bank/foundation.md"
          test ! -e "$TARGET/.memory-bank/features/FT-000-foundation.md"
          test ! -e "$TARGET/.memory-bank/tasks/TASK-000-T1-FT-000-W0.task.json"
          test ! -e "$TARGET/.memory-bank/tasks/TASK-001-T2-FT-001-W1.task.json"
          ! grep -q 'REQ-000' "$TARGET/.memory-bank/requirements.md"

          (
            cd "$TARGET"
            node scripts/mb-lint.mjs
            node scripts/mb-doctor.mjs
            node "$GITHUB_WORKSPACE/skills/_shared/scripts/init-mb.js" --sync
            grep -Fq '## KISS / Avoid overengineering' AGENTS.md
            grep -Fq 'Implement the simplest solution that fully satisfies current requirements and specs.' AGENTS.md
            grep -Fq '## Communication' AGENTS.md
            grep -Fq 'Always answer this user in Russian, while preserving stable English technical terms and established expressions when they are conventional in software engineering, product, or workflow contexts.' AGENTS.md
            ! grep -R -E 'ROLLBACK_RECOVERY_NOTE|TASK_T3_ROLLBACK_MISSING' \
              AGENTS.md .agents/skills .claude/skills .memory-bank/workflows scripts/mb-doctor.mjs
            node scripts/mb-lint.mjs
            node scripts/mb-doctor.mjs
          )

          node "$GITHUB_WORKSPACE/scripts/install-framework.mjs" --bootstrap --target "$TARGET" --yes --sync
          test ! -e "$TARGET/.memory-bank/commands"
          test ! -e "$TARGET/.memory-bank/tech-specs"
          grep -q '# /spec-design' "$TARGET/.agents/skills/spec-design/SKILL.md"
          grep -Fq '## KISS / Avoid overengineering' "$TARGET/AGENTS.md"
          grep -Fq '## Communication' "$TARGET/AGENTS.md"
          grep -Fq 'Always answer this user in Russian, while preserving stable English technical terms and established expressions when they are conventional in software engineering, product, or workflow contexts.' "$TARGET/AGENTS.md"
          ! grep -R -E 'ROLLBACK_RECOVERY_NOTE|TASK_T3_ROLLBACK_MISSING' \
            "$TARGET/AGENTS.md" "$TARGET/.agents/skills" "$TARGET/.claude/skills" \
            "$TARGET/.memory-bank/workflows" "$TARGET/scripts/mb-doctor.mjs"

          LEGACY_TARGET="$TMP_DIR/legacy-target"
          node - "$LEGACY_TARGET" <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const root = process.argv[2];
          const testingDir = path.join(root, '.memory-bank', 'testing');
          fs.mkdirSync(testingDir, { recursive: true });
          const testingIndex = `---
          description: Legacy project testing policy.
          status: active
          ---
          # Legacy Testing Policy
          - Keep this custom policy byte-identical.
          `.replace(/^          /gm, '');
          const specIndex = `---
          description: Legacy spec registry.
          status: active
          ---
          # Legacy Spec Index
          | Type | Path | Status | Scope | Change route |
          |---|---|---|---|---|
          | testing | [.memory-bank/testing/index.md](testing/index.md) | active | Legacy project policy. | explicit user decision |
          `.replace(/^          /gm, '');
          fs.writeFileSync(path.join(testingDir, 'index.md'), testingIndex);
          fs.writeFileSync(path.join(root, '.memory-bank', 'spec-index.md'), specIndex);
          fs.writeFileSync(path.join(root, 'testing-index.before'), testingIndex);
          fs.writeFileSync(path.join(root, 'spec-index.before'), specIndex);
          NODE

          node "$GITHUB_WORKSPACE/scripts/install-framework.mjs" --bootstrap --target "$LEGACY_TARGET" --yes --sync
          cmp "$LEGACY_TARGET/testing-index.before" "$LEGACY_TARGET/.memory-bank/testing/index.md"
          cmp "$LEGACY_TARGET/spec-index.before" "$LEGACY_TARGET/.memory-bank/spec-index.md"
          test ! -e "$LEGACY_TARGET/.memory-bank/testing/strategy.md"

          PARTIAL_LEGACY_TARGET="$TMP_DIR/partial-legacy-target"
          node - "$PARTIAL_LEGACY_TARGET" <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const root = process.argv[2];
          const testingDir = path.join(root, '.memory-bank', 'testing');
          fs.mkdirSync(testingDir, { recursive: true });
          const testingIndex = `---
          description: Existing legacy testing policy.
          status: active
          ---
          # Existing Legacy Testing Policy
          `.replace(/^          /gm, '');
          fs.writeFileSync(path.join(testingDir, 'index.md'), testingIndex);
          fs.writeFileSync(path.join(root, 'testing-index.before'), testingIndex);
          NODE

          node "$GITHUB_WORKSPACE/scripts/install-framework.mjs" --bootstrap --target "$PARTIAL_LEGACY_TARGET" --yes --sync
          cmp "$PARTIAL_LEGACY_TARGET/testing-index.before" "$PARTIAL_LEGACY_TARGET/.memory-bank/testing/index.md"
          test ! -e "$PARTIAL_LEGACY_TARGET/.memory-bank/testing/strategy.md"
          grep -Fq '| testing | [.memory-bank/testing/index.md](testing/index.md) | active | Existing project testing policy. | explicit project-level user decision |' "$PARTIAL_LEGACY_TARGET/.memory-bank/spec-index.md"
          grep -Fq '[.memory-bank/testing/index.md](testing/index.md)' "$PARTIAL_LEGACY_TARGET/.memory-bank/index.md"
          (
            cd "$PARTIAL_LEGACY_TARGET"
            node scripts/mb-lint.mjs
          )

          EMPTY_LEGACY_TARGET="$TMP_DIR/empty-legacy-target"
          node - "$EMPTY_LEGACY_TARGET" <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          fs.mkdirSync(path.join(process.argv[2], '.memory-bank'), { recursive: true });
          NODE

          node "$GITHUB_WORKSPACE/scripts/install-framework.mjs" --bootstrap --target "$EMPTY_LEGACY_TARGET" --yes --sync
          test -f "$EMPTY_LEGACY_TARGET/.memory-bank/testing/index.md"
          test ! -e "$EMPTY_LEGACY_TARGET/.memory-bank/testing/strategy.md"
          grep -Fq '[.memory-bank/testing/index.md](testing/index.md)' "$EMPTY_LEGACY_TARGET/.memory-bank/index.md"
          grep -Fq '[SDD Spec Index](../spec-index.md)' "$EMPTY_LEGACY_TARGET/.memory-bank/testing/index.md"
          ! grep -Fq '[Testing strategy](strategy.md)' "$EMPTY_LEGACY_TARGET/.memory-bank/testing/index.md"
          ! grep -q '^| testing |' "$EMPTY_LEGACY_TARGET/.memory-bank/spec-index.md"
          (
            cd "$EMPTY_LEGACY_TARGET"
            node scripts/mb-lint.mjs
          )

      - name: Single-card handoff doctor fixtures
        shell: bash
        run: |
          set -euo pipefail
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT

          TARGET="$TMP_DIR/target-repo"
          node "$GITHUB_WORKSPACE/scripts/install-framework.mjs" --bootstrap --target "$TARGET" --yes
          node - "$TARGET" <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const root = process.argv[2];
          const write = (rel, content) => {
            const target = path.join(root, rel);
            fs.mkdirSync(path.dirname(target), { recursive: true });
            fs.writeFileSync(target, content);
          };
          fs.appendFileSync(path.join(root, '.memory-bank/requirements.md'), '\n## REQ-001\n- Complete fixture requirement.\n');
          write('.memory-bank/features/FT-001-fixture.md', `---
          description: Complete fixture feature.
          status: active
          lifecycle: planned
          clarification_status: complete
          spec_design_status: complete
          spec_design_links:
            - .memory-bank/contracts/fixture-boundary.md
          ---
          # FT-001 Fixture
          ## Clarifications
          - No critical ambiguity found.
          `);
          write('.memory-bank/contracts/fixture-boundary.md', `---
          description: Fixture canonical boundary spec.
          status: active
          ---
          # Fixture Boundary
          ## Shape
          - One fixture task.
          ## Rules
          - MUST remain deterministic.
          ## Edge cases/errors
          - Missing context is rejected.
          ## Verification target
          - node --version exits successfully.
          `);
          const id = 'TASK-001-T2-FT-001-W1';
          const task = {
            id,
            title: 'Complete fixture task',
            status: 'ready',
            wave: 'W1',
            feature: 'FT-001',
            reqs: ['REQ-001'],
            depends_on: [],
            touched_files: ['src/fixture.js'],
            tier: 'T2',
            gates: [{ name: 'node', command: 'node --version', required: true }],
            verify: [],
            docs: [],
            evidence_required: [],
            purpose: 'Prove the complete single-card fixture.',
            success_outcome: 'The deterministic fixture command succeeds.',
            anti_goals: [],
            runtime_context: {
              forbidden_scope: [],
              stop_conditions: []
            },
            source_artifacts: ['.memory-bank/contracts/fixture-boundary.md'],
            normative_inputs: [],
            constraints: [],
            invariants: [],
            verification_targets: []
          };
          const compactId = 'TASK-000-T0-FT-001-W1';
          const compactTask = {
            ...task,
            id: compactId,
            title: 'Compact fixture task',
            status: 'done',
            tier: 'T0',
            touched_files: ['README.md'],
            gates: [],
            verify: ['VERDICT: PASS\nEvidence: compact fixture'],
            purpose: undefined,
            success_outcome: undefined,
            anti_goals: undefined,
            runtime_context: undefined
          };
          Object.keys(compactTask).forEach((key) => compactTask[key] === undefined && delete compactTask[key]);
          const criticalId = 'TASK-002-T3-FT-001-W1';
          const criticalTask = {
            ...task,
            id: criticalId,
            title: 'Full protocol fixture task',
            status: 'done',
            tier: 'T3',
            touched_files: ['src/critical.js'],
            verify: ['VERDICT: PASS\nEvidence: strict T3 fixture']
          };
          for (const record of [compactTask, task, criticalTask]) {
            write(`.memory-bank/tasks/${record.id}.task.json`, `${JSON.stringify(record, null, 2)}\n`);
          }
          write(`.protocols/${compactId}/run.md`, 'VERDICT: PASS\nEvidence: compact fixture\n');
          for (const file of ['context.md', 'plan.md', 'progress.md', 'verification.md', 'handoff.md']) {
            write(`.protocols/${criticalId}/${file}`, '# Fixture\n');
          }
          write(`.protocols/${criticalId}/red-verification.md`, 'SEMANTIC_VERDICT: semantic-pass\nEvidence: strict T3 fixture\n');
          write(`.protocols/${criticalId}/handoff.md`, '# Fixture\nHUMAN_CHECKPOINT: done\n');
          write('.memory-bank/spec-backbone.md', `---
          description: Strict fixture backbone.
          status: active
          ---
          # Spec Backbone
          ## Global Backbone Status
          - Status: minimal
          - Mode: local_simple_backbone
          - Architecture artifact strategy: single-file
          - Not applicable areas:
            - event_message_contracts: not_applicable - strict fixture has no event boundary.
          - Notes: Strict doctor fixture.
          `);
          const records = [compactId, id, criticalId].map((taskId) => ({ id: taskId, file: `${taskId}.task.json` }));
          write('.memory-bank/tasks/index.json', `${JSON.stringify({ version: 1, tasks: records }, null, 2)}\n`);
          NODE

          (
            cd "$TARGET"
            node scripts/mb-lint.mjs
            if node scripts/mb-doctor.mjs --json --unsupported-fixture-flag > invalid-cli-doctor.json; then
              echo 'mb-doctor accepted an unsupported CLI argument'
              exit 1
            fi
            node -e 'const r=require("./invalid-cli-doctor.json"); const f=r.findings.filter((item)=>item.code==="CLI_INVALID_ARGUMENT"); if (r.status!=="fail" || r.summary.errors!==1 || f.length!==1 || f[0].severity!=="error") process.exit(1)'
            node scripts/mb-doctor.mjs --json > complete-doctor.json
            node -e 'const r=require("./complete-doctor.json"); if (r.findings.some((f)=>f.code==="TASK_HANDOFF_INCOMPLETE")) process.exit(1)'
            node scripts/mb-doctor.mjs --strict --json > strict-t3-doctor.json
            node -e 'const r=require("./strict-t3-doctor.json"); if (r.status!=="pass" || r.summary.errors!==0 || r.findings.some((f)=>f.code==="TASK_T3_ROLLBACK_MISSING")) process.exit(1)'
            node - <<'NODE'
          const fs = require('node:fs');
          const indexPath = '.memory-bank/index.md';
          const original = fs.readFileSync(indexPath, 'utf8');
          const invalid = original.replace(/^.*constitution\.md.*\n/m, '');
          if (invalid === original) throw new Error('fixture could not remove Constitution route');
          fs.writeFileSync('memory-bank-index.before', original);
          fs.writeFileSync(indexPath, invalid);
          NODE
            if node scripts/mb-doctor.mjs --strict --json > constitution-structure-doctor.json; then
              echo 'strict mb-doctor accepted a missing Constitution router link'
              exit 1
            fi
            node -e 'const r=require("./constitution-structure-doctor.json"); const f=r.findings.filter((item)=>item.code==="CONSTITUTION_STRUCTURE_INVALID"); if (r.status!=="fail" || r.summary.errors!==1 || f.length!==1 || f[0].severity!=="error") process.exit(1)'
            node -e 'const fs=require("node:fs"); fs.writeFileSync(".memory-bank/index.md", fs.readFileSync("memory-bank-index.before"))'
            node - <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const id = 'TASK-001-T2-FT-001-W1';
          const taskPath = `.memory-bank/tasks/${id}.task.json`;
          const task = JSON.parse(fs.readFileSync(taskPath, 'utf8'));
          task.status = 'done';
          task.verify = ['VERDICT: PASS\nEvidence: completed T2 feature fixture'];
          fs.writeFileSync(taskPath, `${JSON.stringify(task, null, 2)}\n`);
          for (const file of ['context.md', 'plan.md', 'progress.md', 'verification.md', 'handoff.md']) {
            const target = path.join('.protocols', id, file);
            fs.mkdirSync(path.dirname(target), { recursive: true });
            fs.writeFileSync(target, '# Completed T2 feature fixture\n');
          }
          NODE
            node scripts/mb-lint.mjs
            node scripts/mb-doctor.mjs --json > feature-red-default-doctor.json
            node -e 'const r=require("./feature-red-default-doctor.json"); const f=r.findings.filter((item)=>item.code==="FEATURE_RED_VERIFY_VERDICT_MISSING"); if (r.status!=="pass" || r.summary.errors!==0 || f.length!==1 || f[0].severity!=="warning") process.exit(1)'
            if node scripts/mb-doctor.mjs --strict --json > feature-red-strict-doctor.json; then
              echo 'strict mb-doctor accepted a completed T2 feature without semantic-pass'
              exit 1
            fi
            node -e 'const r=require("./feature-red-strict-doctor.json"); const f=r.findings.filter((item)=>item.code==="FEATURE_RED_VERIFY_VERDICT_MISSING"); if (r.status!=="fail" || r.summary.errors!==1 || f.length!==1 || f[0].severity!=="error") process.exit(1)'
            node -e 'const fs=require("node:fs"); const p=".memory-bank/tasks/TASK-001-T2-FT-001-W1.task.json"; const t=JSON.parse(fs.readFileSync(p)); t.status="ready"; t.verify=[]; fs.writeFileSync(p, JSON.stringify(t,null,2)+"\n")'
            node -e 'const fs=require("node:fs"); const p=".memory-bank/tasks/TASK-001-T2-FT-001-W1.task.json"; const t=JSON.parse(fs.readFileSync(p)); t.purpose=""; t.touched_files=[]; t.gates=[]; fs.writeFileSync(p, JSON.stringify(t,null,2)+"\n")'
            node scripts/mb-doctor.mjs --json > incomplete-doctor.json
            node -e 'const r=require("./incomplete-doctor.json"); if (!r.findings.some((f)=>f.code==="TASK_HANDOFF_INCOMPLETE")) process.exit(1)'
            node -e 'const fs=require("node:fs"); const p=".memory-bank/tasks/TASK-001-T2-FT-001-W1.task.json"; const t=JSON.parse(fs.readFileSync(p)); t.title=42; fs.writeFileSync(p, JSON.stringify(t,null,2)+"\n")'
            if node scripts/mb-lint.mjs > invalid-schema-lint.txt 2>&1; then
              echo 'mb-lint accepted a task that violates task.schema.json string types'
              exit 1
            fi
            grep -q "'title' must be a string" invalid-schema-lint.txt
          )
